name: benaiah_app
description: "Benaiah App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  easy_localization: ^3.0.7
  easy_localization_loader: ^2.0.2
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  go_router: ^17.1.0
  hooks_riverpod: ^3.3.1
  injectable: ^2.7.1+4
  json_annotation: ^4.9.0
  riverpod_annotation: ^4.0.2
  sentry_flutter: ^9.16.0

dev_dependencies:
  build_runner: ^2.4.0
  flutter_flavorizr: 2.4.2
  flutter_gen_runner: ^5.13.0+1
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  injectable_generator: ^2.6.0
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.0
  very_good_analysis: ^10.2.0

flavorizr:
  flavors:
    dev:
      app:
        name: "Benaiah [DEV]"
      android:
        applicationId: "org.benaiah.app.dev"
      ios:
        bundleId: "org.benaiah.app.dev"
    qa:
      app:
        name: "Benaiah [QA]"
      android:
        applicationId: "org.benaiah.app.qa"
      ios:
        bundleId: "org.benaiah.app.qa"
    prod:
      app:
        name: "Benaiah"
      android:
        applicationId: "org.benaiah.app"
      ios:
        bundleId: "org.benaiah.app"

flutter_gen:
  output: lib/gen/
  line_length: 80

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/
    - assets/icons/
